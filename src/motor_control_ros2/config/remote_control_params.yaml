remote_control_node:
  ros__parameters:
    # 轴映射 (基于 Xbox 风格手柄或 PS4 手柄)
    # Xbox/标准 Linux 手柄轴映射:
    # 0: 左摇杆 X（左右）
    # 1: 左摇杆 Y（前后）
    # 2: 左触发器
    # 3: 右摇杆 X（旋转）
    # 4: 右摇杆 Y
    # 5: 右触发器
    # 6: D-pad X
    # 7: D-pad Y
    
    axis_forward: 1          # 前后运动 (左摇杆 Y 轴，-1 向前，1 向后)
    axis_strafe: 0           # 左右运动 (左摇杆 X 轴，-1 向左，1 向右)
    axis_rotate: 3           # 旋转运动 (右摇杆 X 轴，-1 逆时针，1 顺时针)
    
    # 按钮映射 (Xbox 风格手柄)
    # 0: A        1: B        2: X           3: Y
    # 4: LB       5: RB       6: Back        7: Start
    # 8: 左摇杆按压  9: 右摇杆按压  10: Xbox button
    
    button_speed_up: 5       # 加速按钮 (RB)
    button_speed_down: 4     # 减速按钮 (LB)
    button_stop: 6           # 紧急停止按钮 (Back)

    # delta_arm 扳机控制
    arm_trigger_axis: 5              # RT
    arm_trigger_threshold: 0.15      # 触发阈值（归一化后）
    arm_trigger_reset_threshold: 0.05  # 回位阈值（归一化后）
    arm_min_angle_rad: 0.0
    arm_max_angle_rad: 1.268
    arm_protection_press_limit: 3
    arm_protection_window_sec: 2.0

    # 速度限制参数
    max_linear_velocity: 10.0     # 最大线速度 (m/s)
    max_angular_velocity: 3.14   # 最大角速度 (rad/s)
    
    # 速度缩放参数
    default_speed_scale: 0.5     # 默认速度缩放因子 (50% 最大速度)
    speed_scale_step: 0.1        # 每次按下加速/减速按钮调整的步长 (10%)
    
    # 死区参数（防止摇杆漂移）
    deadzone: 0.1                # 摇杆死区范围 [0, 1]
    
    # 发布频率
    publish_frequency: 50.0      # 命令发布频率 (Hz)
